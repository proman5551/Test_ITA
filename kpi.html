<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSPIRE — KPI 관리</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/kpi.css" />
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
<div id="wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-top">
      <div class="logo-icon" onclick="toggleSidebar()">
        <i class="ti ti-shield-lock" aria-hidden="true"></i>
      </div>
      <div class="logo-text-wrap">
        <div class="logo-name">INSPIRE</div>
        <div class="logo-sub">Security Team</div>
      </div>
      <button class="collapse-btn" id="collapseBtn" onclick="toggleSidebar()" aria-label="사이드바 접기/펼치기">
        <i class="ti ti-layout-sidebar-left-collapse" id="collapseIcon"></i>
      </button>
    </div>

    <div class="sb-ws">
      <div class="sb-label">워크스페이스</div>
      <div class="ws-box"><div class="ws-dot"></div><div class="ws-name">Control Room</div></div>
    
    </div>
<div class="sb-section">
  <div class="sb-label">개인 업무</div>
  <div id="personalMenu"></div>
</div>

<div class="sb-section">
  <div class="sb-label">업무</div>
  <div id="workMenu"></div>
</div>

<div class="sb-foot">

  <div class="page-switch-row" id="pageSwitchRow"></div>

  <div class="user-row">
    <div class="avatar" id="userAvatar"></div>

    <div class="user-info">
      <div class="user-name" id="loginUserName"></div>
      <div class="user-role" id="loginUserInfo"></div>
    </div>

    <button class="logout-btn" onclick="logout()" aria-label="로그아웃">
      <i class="ti ti-logout" aria-hidden="true"></i>
    </button>
  </div>

</div>

  </aside>

  <!-- MAIN -->
  <div class="right-main">
    <div class="topbar">
      <div class="greeting">
        <div class="greeting-name">KPI 관리 <i class="ti ti-target"></i></div>
        <div class="greeting-date" id="currentDateTime"></div>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="kpiSearch" placeholder="KPI 제목, 멤버 검색..." />
      </div>
      <div class="top-actions">
        <div class="icon-btn"><i class="ti ti-bell"></i></div>
        <div class="dark-toggle" onclick="toggleDark()" role="button" aria-label="다크모드">
          <div class="knob" id="knob">🌙</div>
        </div>
      </div>
    </div>

    <div class="kpi-content">
      <div class="kpi-main">

        <!-- 요약 카드 -->
        <div class="kpi-summary-row" id="kpiSummaryRow"></div>

        <!-- 상단 3단 패널 -->
        <div class="top-panels">

          <!-- 전월 대비 (작게) -->
          <div class="card panel-compare">
            <div class="card-head">
              <i class="ti ti-chart-arrows-vertical"></i>
              <div class="card-head-title">전월 대비</div>
              <span class="card-head-badge badge-gray" id="compareBadge">전월→이번달</span>
            </div>
            <div class="compare-area" id="compareArea"></div>
          </div>

          <!-- 최근 진행 로그 -->
          <div class="card panel-logs">
            <div class="card-head">
              <i class="ti ti-activity"></i>
              <div class="card-head-title">최근 진행 로그</div>
              <span class="card-head-badge badge-blue" id="logCount">0</span>
            </div>
            <div class="log-feed" id="logFeed"></div>
          </div>

          <!-- 최근 피드백 -->
          <div class="card panel-feedback">
            <div class="card-head">
              <i class="ti ti-message-circle"></i>
              <div class="card-head-title">최근 피드백</div>
              <span class="card-head-badge badge-ok" id="feedbackCount">0</span>
            </div>
            <div class="feedback-feed" id="feedbackFeed"></div>
          </div>

        </div>

        <!-- KPI 리스트 -->
        <div class="kpi-list-header">
          <div class="kpi-list-title"><i class="ti ti-list-check"></i> KPI 항목 목록</div>
          <div class="kpi-list-actions">
            <div class="filter-tabs" id="filterTabs">
              <button class="filter-tab active" data-filter="all">전체</button>
              <button class="filter-tab" data-filter="before">시작전</button>
              <button class="filter-tab" data-filter="inprogress">진행중</button>
              <button class="filter-tab" data-filter="review">검토중</button>
              <button class="filter-tab" data-filter="done">완료</button>
              <button class="filter-tab" data-filter="rejected">반려</button>
            </div>
            <button class="btn-csv" onclick="exportKPItoCSV()"><i class="ti ti-download"></i> CSV 내보내기</button>
            <button class="btn-add" onclick="openModal()"><i class="ti ti-plus"></i> KPI 추가</button>
          </div>
        </div>

        <div class="kpi-grid" id="kpiGrid"></div>

      </div>

      <!-- Right Panel -->
      <aside class="right-panel">
        <div class="rp-block">
          <div class="rp-title">상태 현황</div>
          <div id="statusSummary"></div>
        </div>
        <div class="rp-block">
          <div class="rp-title">전체 달성률</div>
          <div class="big-gauge" id="bigGauge"></div>
        </div>
        <div class="rp-block">
          <div class="rp-title">마감 임박</div>
          <div id="dueSoonList"></div>
        </div>
        <div class="rp-block">
          <div class="rp-title" style="color:#9f1239;">기간 초과</div>
          <div id="overdueList"></div>
        </div>
      </aside>
    </div>
  </div>
</div>

<!-- KPI 추가/수정 모달 -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">KPI 추가</div>
      <button class="modal-close" onclick="closeModal(null)"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="form-row two">
        <div class="form-group">
          <label>Title <span class="req">*</span></label>
          <input type="text" id="fTitle" placeholder="KPI 제목" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="before">시작전</option>
            <option value="inprogress">진행중</option>
            <option value="review">검토중</option>
            <option value="done">완료</option>
            <option value="rejected">반려</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="fDesc" rows="2" placeholder="KPI 설명 및 배경"></textarea>
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label>Start Date <span class="req">*</span></label>
          <input type="date" id="fStart" />
        </div>
        <div class="form-group">
          <label>Due Date <span class="req">*</span></label>
          <input type="date" id="fDue" />
        </div>
      </div>
      <div class="form-group">
        <label>Members</label>
        <input type="text" id="fMembers" placeholder="예: 손대훈, 김아무개" />
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label>Quantitative Metrics</label>
          <input type="text" id="fMetric" placeholder="예: 사건처리 건수" />
        </div>
        <div class="form-group">
          <label>Target</label>
          <input type="number" id="fTarget" placeholder="예: 100" min="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Current Value</label>
        <div class="progress-input-row">
          <input type="number" id="fCurrent" placeholder="예: 72" min="0" />
          <div class="progress-preview">
            <div class="progress-track"><div class="progress-fill" id="modalProgressFill"></div></div>
            <span class="progress-pct" id="modalProgressPct">0%</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>진행도 로그</label>
        <div class="log-input-row">
          <input type="date" id="fLogDate" />
          <input type="number" id="fLogValue" placeholder="수치" min="0" />
          <input type="text" id="fLogNote" placeholder="메모 (선택)" />
          <button class="btn-log-add" onclick="addLogEntry()"><i class="ti ti-plus"></i></button>
        </div>
        <div class="log-list" id="fLogList"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal(null)">취소</button>
      <button class="btn-save" onclick="saveKPI()">저장</button>
    </div>
  </div>
</div>

<!-- 피드백 모달 -->
<div class="modal-backdrop" id="feedbackBackdrop" onclick="closeFeedbackModal(event)">
  <div class="modal modal-feedback" id="feedbackModal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="fbModalTitle">피드백</div>
        <div style="font-size:11px;color:var(--text-sec);margin-top:2px;" id="fbModalKpiName"></div>
      </div>
      <button class="modal-close" onclick="closeFeedbackModal(null)"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" style="gap:10px;">
      <div class="fb-thread" id="fbThread"></div>
      <div class="fb-input-area">
        <div class="fb-input-row">
          <select id="fbAuthorRole" class="fb-role-select">
            <option value="supervisor">팀장</option>
            <option value="manager">매니저</option>
            <option value="peer">동료</option>
          </select>
          <input type="text" id="fbAuthorName" placeholder="작성자 이름" />
        </div>
        <div class="fb-input-row">
          <textarea id="fbText" rows="2" placeholder="피드백 내용을 입력하세요..."></textarea>
          <button class="btn-fb-send" onclick="submitFeedback()"><i class="ti ti-send"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 삭제 확인 -->
<div class="modal-backdrop" id="deleteBackdrop" onclick="closeDelete(event)">
  <div class="modal modal-sm" id="deleteModal">
    <div class="modal-header">
      <div class="modal-title">KPI 삭제</div>
      <button class="modal-close" onclick="closeDelete(null)"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-primary);">이 KPI 항목을 삭제하시겠습니까?<br><span style="font-size:11px;color:var(--text-sec);">삭제 후 복구가 불가능합니다.</span></p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDelete(null)">취소</button>
      <button class="btn-danger" id="btnConfirmDelete">삭제</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/kpi.js"></script>
</body>
</html>
